<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Várzea Online</title>
<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no">

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Arial, sans-serif;

  background:url("https://i.imgur.com/YF7IHur.png") no-repeat center center;
  background-size:cover;

  display:flex;
  justify-content:center;
  align-items:flex-end;
}

/* Container principal */
.menu-container{
  width:300px;
  margin-bottom:50px;

  background:rgba(0,0,0,0.78);
  border-radius:18px;

  padding:10px;
  text-align:center;

  backdrop-filter:blur(6px);
}

.menu-container h2{
  margin:0 0 10px;
  font-size:12px;
  color:gold;
  letter-spacing:1px;
  text-shadow:0 0 10px rgba(255,215,0,0.5);
}

input, select{
  width:90%;
  padding:5px;
  margin:5px 0;

  border:none;
  border-radius:10px;
  font-size:12px;

  background:rgba(255,255,255,0.1);
  color:white;
  outline:none;
  text-align:center;
}

select option{
  background:black;
  color:white;
}

button{
  width:95%;
  padding:5px;
  margin-top:0px;

  border:none;
  border-radius:12px;

  font-size:12px;
  font-weight:bold;
  cursor:pointer;

  background:linear-gradient(to right,#ffcc00,#ff8800);
  color:black;

  transition:0.25s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(255,200,0,0.6);
}

/* Laterais */
.side-decor{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  height:400px;
  width:auto;

  opacity:0;
  transition:opacity 1s ease-in-out;
}

.left{ left:140px; }
.right{ right:140px; }

hr{
  margin:5px 0;
  border:1px solid rgba(255,255,255,0.1);
}
#audioLobby{
  position:absolute;
  top:180px;
  right:20px;

  display:flex;
  flex-direction:column;
  gap:1px;

  z-index:9999;
}

#audioLobby button{
  background:#111;
  color:white;
  border:1px solid #555;
  padding:6px 15px;
  border-radius:30px;
  cursor:pointer;
  font-size:10px;
}

#audioLobby button:hover{
  background:#222;
}

#audioLobby input{
  width:60px;
  accent-color: rgb(0,255,120);
}

#lobbyBanner{
  position:absolute;
  top:20px;
  left:57%;
  transform:translateX(-50%);
  width:400px;
  z-index:50;

  transition: transform 1s ease-in-out;
}

#lobbyBanner img{
  width:70%;
  height:auto;
  display:block;
  border-radius:12px;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999999;
}

.modal-box{
  background:#111;
  padding:25px 35px;
  border-radius:15px;
  text-align:center;
  color:white;
  width:220px;
  box-shadow:0 0 25px rgba(255,215,0,0.4);
}

.modal-box h3{
  margin:0 0 15px;
  color:gold;
}

.modal-box p{
  margin-bottom:20px;
}

.modal-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
}

.modal-buttons button{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* BOTÃO CONTATO */
#contactBtn{
  position:absolute;
  width: 50px;
  height:20px;
  bottom:235px; /* acima do copyright */
  right:40px;
  font-size:10px;
  padding:4px 8px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
  cursor:pointer;
  opacity:0.8;
}

#contactBtn:hover{
  opacity:1;
  background:#333;
}
#fullscreenLobbyBtn{
  position:absolute;
  width: 90px;
  height:20px;
  bottom:265px; /* acima do botão contato */
  right:20px;
  font-size:10px;
  padding:4px 8px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
  cursor:pointer;
  opacity:0.8;
}

#fullscreenLobbyBtn:hover{
  opacity:1;
  background:#333;
}

/* ===================== */
/* MOBILE ADAPTATION */
/* ===================== */

@media (max-width: 50px){

  body{
    align-items:center;
  }

  .menu-container{
    width:45%;
    margin-bottom:20px;
    padding:20px;
  }

  .menu-container h2{
    font-size:10px;
  }

  input, select{
    font-size:16px;
    padding:14px;
  }

  button{
    font-size:15px;
    padding:12px;
  }

  /* esconder personagens laterais no mobile */
  .side-decor{
    display:none;
  }

  /* banner central maior */
  #lobbyBanner{
    width:40%;
    top:10px;
  }

  /* audio reposicionado */
  #audioLobby{
    top:10px;
    right:10px;
  }

  /* botão contato */
  #contactBtn{
    bottom:20px;
    right:0px;
  }

  #fullscreenLobbyBtn{
    bottom:50px;
    right:15px;
  }

}

</style>
</head>

<script src="/socket.io/socket.io.js"></script>
<script src="/lobby-mobile.js"></script>

<body>


<img class="side-decor left"  id="leftImg"  src="https://i.imgur.com/uuEvIlD.png">
<img class="side-decor right" id="rightImg" src="https://i.imgur.com/Hmbou7i.png">

<div id="lobbyBanner">
  <img id="bannerImg" src="https://i.imgur.com/JelZIZD.png">
</div>

<button id="contactBtn">Contato</button>
<button id="fullscreenLobbyBtn">⛶ Tela Cheia</button>

<div id="audioLobby">
  <button id="musicToggleLobby">🎵 ON</button>
  <input type="range"
    id="volumeSliderLobby"
    min="0"
    max="1"
    step="0.01"
    value="0.2">

    <button id="manualLobbyBtn">📘 Manual</button>
</div>

<div class="menu-container">



  <input type="text" id="nickname" placeholder="Seu nickname">

  <select id="role">
    <option value="blue">Time Azul</option>
    <option value="red">Time Vermelho</option>
    <option value="spectator">Espectador</option>
  </select>

  <button id="createRoomBtn">Criar Sala</button>

  <hr>

  <input type="text" id="roomCode" placeholder="Código da sala">

  <button id="joinRoomBtn">Entrar na Sala</button>

</div>

<!-- 🎵 Música online -->
<audio id="bgMusic" loop>
  <source src="https://res.cloudinary.com/dzjwlafsx/video/upload/v1771868321/background_x393rd.mp3" type="audio/mpeg">
</audio>




<!-- Modal de Confirmação -->
<div id="modalOverlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">

    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>

    <div class="modal-buttons">
      <button id="confirmBtn">Confirmar</button>
      <button id="cancelModalBtn">Cancelar</button>
    </div>

  </div>
</div>

<!-- Modal Contato -->
<div id="contactModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>Contato</h3>
    <p>
      Entre em contato conosco e envie seus elogios,
      dúvidas e/ou sugestões para o email:<br><br>
      <strong>varzea.online@outlook.com</strong>
    </p>

    <div class="modal-buttons">
      <button id="confirmBtn">Confirmar</button>
      <button id="cancelModalBtn">Cancelar</button>
    </div>
  </div>
</div>

</body>
</html>
